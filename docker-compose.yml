version: "3.8"

services:
  db:
    image: ankane/pgvector:latest
    container_name: neuron-db
    restart: always
    environment:
      POSTGRES_DB: neuron
      POSTGRES_USER: neuron
      POSTGRES_PASSWORD: neuron_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuron"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: neuron-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://neuron:neuron_pass@db:5432/neuron
      - JWT_SECRET=super-secret-neuron-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - WAITLIST_ADMIN_PASSWORD=${WAITLIST_ADMIN_PASSWORD:-neuron_admin_secret}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - PUBLIC_APP_URL=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: neuron-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
